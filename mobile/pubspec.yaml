name: niche_watcher
description: "Aggrégateur de contenu dev - RSS + Reddit digest hebdomadaire"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Themes
  cupertino_icons: ^1.0.5
  google_fonts: ^6.0.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.0
  
  # Notifications/Messaging
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
