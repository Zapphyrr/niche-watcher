version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: niche-watcher-db
    environment:
      POSTGRES_USER: niche_user
      POSTGRES_PASSWORD: niche_password
      POSTGRES_DB: niche_watcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U niche_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
